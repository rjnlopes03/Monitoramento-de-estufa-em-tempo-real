# Configuração mínima do broker Mosquitto para desenvolvimento.
# ATENÇÃO: acesso anônimo liberado — apropriado apenas para testes locais.
listener 1883
allow_anonymous true

# Suporte a WebSocket (útil para clientes no navegador, etapas futuras).
listener 9001
protocol websockets

# Persistência das mensagens retidas / sessões.
persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
